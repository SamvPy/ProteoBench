[mapper]
"Peptide Sequence" = "Sequence"
"Protein" = "Proteins" # For FragPipe outputs, we combine the values in "Proteins" and "Mapped Proteins"
"Charge" = "Charge"

[condition_mapper]
"240pg_10pg_H_Y_r1" = "A"
"240pg_10pg_H_Y_r2" = "A"
"240pg_10pg_H_Y_r3" = "A"
"200pg_50pg_H_Y_r1" = "B"
"200pg_50pg_H_Y_r2" = "B"
"200pg_50pg_H_Y_r3" = "B"

[run_mapper]
"240pg_10pg_H_Y_r1" = "240pg_10pg_H_Y_r1"
"240pg_10pg_H_Y_r2" = "240pg_10pg_H_Y_r2"
"240pg_10pg_H_Y_r3" = "240pg_10pg_H_Y_r3"
"200pg_50pg_H_Y_r1" = "200pg_50pg_H_Y_r1"
"200pg_50pg_H_Y_r2" = "200pg_50pg_H_Y_r2"
"200pg_50pg_H_Y_r3" = "200pg_50pg_H_Y_r3"

[species_mapper]
"_YEAST" = "YEAST"
"_HUMAN" = "HUMAN"

[modifications_parser]
"parse_column" = "Modified Sequence"
"before_aa" = false
"isalpha" = true
"isupper" = true
"pattern"="\\[([^]]+)\\]"
"modification_dict" = {"[57.0215]" = "Carbamidomethyl", "[57.0216]" = "Carbamidomethyl", "[15.9949]" = "Oxidation", "[-17.026548]" = "Gln->pyro-Glu", "[-18.010565]" = "Glu->pyro-Glu", "[42.0106]" = "Acetyl"}

[general]
"contaminant_flag" = "Cont_"
"decoy_flag" = false
